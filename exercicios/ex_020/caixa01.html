<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixa</title>
    <style>
        h1 {
            background-color: rgb(180, 202, 195);
            height: 200px;
            width: 400px;

            border: 10px solid rgb(118, 245, 207);

            padding: 10px 10px 20px 10px;

            margin: 10px auto 10px auto;

            outline: 5px dashed blue;
           
        }
        a {
           
            border: 5px solid red;

            padding: 5px 5px 5px 5px;
           
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>parágrafos tambem são exemplos de box-level, mas os <a href="#">links são exemplos de caixas inline-level</a> vamos ver como tudo isso funciona.</p>
    
</body>
</html>
